name: Build packages

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: build-packages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: nix build (x86_64-linux)
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build all flake packages
        env:
          AWPKGS_ARTIFACT_DIR: ${{ github.workspace }}/ci/out/artifacts
        run: |
          chmod +x ci/build-packages.sh
          ci/build-packages.sh

      - name: Upload package archives
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: awpkgs-linux-x86_64-${{ github.run_id }}
          path: ci/out/artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" ci/out/artifacts/*.tar.gz ci/out/artifacts/manifest.json --clobber
