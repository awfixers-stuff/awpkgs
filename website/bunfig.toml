# Reduce memory usage at the cost of performance
smol = true

telemetry = false

[test]
smol = true

[install]
optional = false
dev = false
peer = false
exact = true
ignoreScripts = true
auto = "disable"
prefer = "offline"
linkWorkspacePackages = true
minimumReleaseAge = 259200

[install.security]
scanner = "@socketsecurity/bun-security-scanner"
